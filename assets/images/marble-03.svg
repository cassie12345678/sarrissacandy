      <stop offset="0%" stop-color="#fffdfd"/>
      <stop offset="45%" stop-color="#ffe4ee"/>
      <stop offset="100%" stop-color="#ffd0e0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8e5a2"/>
